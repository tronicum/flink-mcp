      parameters:
        - $ref: '#/components/parameters/HubHeader'
        - $ref: '#/components/parameters/HubSlugHeader'
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/UserAgentHeader'
        - $ref: '#/components/parameters/ClientVersionHeader'
        - name: Accept
          in: header
          required: false
          schema:
            type: string
            default: "application/json"
      responses:
        '200':
          description: Home screen content.
          content:
            application/json:
              schema:
                type: object
                description: >
                  Home screen DTO (HomeDto). Shape not fully documented.
                additionalProperties: true
        '401':
          description: Missing or expired Firebase ID token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ---------------------------------------------------------------------------
  # Search
  # ---------------------------------------------------------------------------

  /consumer-backend/discovery/v2/search:
    get:
      operationId: searchProducts
      summary: Search products by query string
      description: >
        Full-text search for products at the active hub. SearchService.kt
        (Zm/i.java) shows this takes `hub-slug`, `locale`, optional
        `Autocomplete-Query-Id`, `Autocomplete-Position`, required
        `search-query-origin` headers, and a `query` query parameter.
      tags:
        - discovery
      parameters:
        - $ref: '#/components/parameters/HubHeader'
        - $ref: '#/components/parameters/HubSlugHeader'
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/UserAgentHeader'
        - $ref: '#/components/parameters/ClientVersionHeader'
        - name: query
          in: query
          required: true
          description: Search query string.
          schema:
            type: string
          example: "Milch"
        - name: Autocomplete-Query-Id
          in: header
          required: false
          description: Algolia autocomplete query ID for analytics attribution.
          schema:
            type: string
            nullable: true
        - name: Autocomplete-Position
          in: header
          required: false
          description: Position in autocomplete list for analytics attribution.
          schema:
            type: string
            nullable: true
        - name: search-query-origin
          in: header
          required: false
          description: >
            Origin of the search query. Observed values: "manual", "autocomplete".
          schema:
            type: string
            default: "manual"
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                type: object
                description: SearchResponseDto. Shape not fully documented.
                additionalProperties: true
        '401':
          description: Missing or expired Firebase ID token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ---------------------------------------------------------------------------
  # Search suggestions (autocomplete)
  # ---------------------------------------------------------------------------

  /consumer-backend/discovery/v1/search/suggestions:
    get:
      operationId: getSearchSuggestions
      summary: Autocomplete / search suggestions
      description: >
        Returns autocomplete suggestions for a partial query. SearchService.kt
        (Zm/i.java) shows this takes `hub-slug`, `locale` headers and a
        `query` query parameter.
      tags:
        - discovery
      parameters:
        - $ref: '#/components/parameters/HubSlugHeader'
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/UserAgentHeader'
        - $ref: '#/components/parameters/ClientVersionHeader'
