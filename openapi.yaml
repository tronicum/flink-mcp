  # Hub detail
  # ---------------------------------------------------------------------------

  /consumer-backend/hub/v1/hubs/{hubId}:
    get:
      operationId: getHub
      summary: Get details for a specific hub
      description: Returns full details for a single hub by its numeric ID.
      tags:
        - hubs
      parameters:
        - name: hubId
          in: path
          required: true
          description: Numeric hub identifier.
          schema:
            type: string
          example: "1234"
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/HubHeader'
        - $ref: '#/components/parameters/HubSlugHeader'
        - $ref: '#/components/parameters/UserAgentHeader'
        - $ref: '#/components/parameters/ClientVersionHeader'
      responses:
        '200':
          description: Hub details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HubResponse'
        '404':
          description: Hub not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

