  # Home screen / product catalog
  # ---------------------------------------------------------------------------

  /consumer-backend/homescreen/v2/home:
    get:
      operationId: getHomescreen
      summary: Fetch home screen product catalog for the active hub
      description: >
        Returns the full home screen content for the hub identified by the
        `hub-slug` header. The response contains product sections, banners,
        and category data. DiscoveryService.kt confirms this endpoint uses
        GET with `hub-slug`, `locale` and `Accept` headers.
