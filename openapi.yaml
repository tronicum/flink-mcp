  /consumer-backend/discovery/v3/products:
    post:
      operationId: getProductsBySku
      summary: Fetch full product details for a list of SKUs
      description: >
        Returns rich product data (name, price, images, etc.) for the supplied
        SKUs. ProductService.kt (Gf/u.java) uses POST with `hub-slug`,
        `locale`, `flink-product-images` headers and a body of type
        GetProductsBySkuBody.
      tags:
        - discovery
      parameters:
        - $ref: '#/components/parameters/HubSlugHeader'
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/UserAgentHeader'
        - $ref: '#/components/parameters/ClientVersionHeader'
        - name: flink-product-images
          in: header
          required: false
          description: >
            Image quality/size hint. Observed value: "webp". Pass empty string
            to omit image optimisation.
          schema:
            type: string
            default: "webp"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: GetProductsBySkuBody. Shape inferred from service definition.
              properties:
                skus:
                  type: array
                  items:
                    type: string
                  example:
                    - "prod-de-0012345"
      responses:
        '200':
          description: Product details.
          content:
            application/json:
              schema:
                type: object
                description: GetProductsBySkuResponse. Shape not fully documented.
                additionalProperties: true
        '401':
          description: Missing or expired Firebase ID token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

