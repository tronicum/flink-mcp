  # ---------------------------------------------------------------------------
  # Product stock / quantities by SKU
  # ---------------------------------------------------------------------------

  /consumer-backend/discovery/v1/products/amounts-by-sku:
    post:
      operationId: getProductAmountsBySku
      summary: Check stock quantities for a list of SKUs
      description: >
        Returns available quantities for the supplied SKUs at the active hub.
        ProductService.kt (Gf/u.java) confirms POST with `hub`, `hub-slug`,
        `locale` headers and a body containing a list of SKUs.
        The request body field name observed in server.py is `skus`.
      tags:
        - discovery
      parameters:
        - $ref: '#/components/parameters/HubHeader'
        - $ref: '#/components/parameters/HubSlugHeader'
        - $ref: '#/components/parameters/LocaleHeader'
        - $ref: '#/components/parameters/UserAgentHeader'
        - $ref: '#/components/parameters/ClientVersionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - skus
              properties:
                skus:
                  type: array
                  items:
                    type: string
                  description: List of product SKUs to query.
                  example:
                    - "prod-de-0012345"
                    - "prod-de-0067890"
      responses:
        '200':
          description: Array of available quantities per SKU.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: AvailableQuantitiesDto. Shape not fully documented.
                  additionalProperties: true
        '401':
          description: Missing or expired Firebase ID token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ---------------------------------------------------------------------------
  # Products by SKU (full product details)
